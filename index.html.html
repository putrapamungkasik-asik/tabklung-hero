<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TABKLUNG V12.5 - SUSTAIN EDITION</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --glow: #fbbf24;
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --blue: #3b82f6;
            --red: #ff4757;
            --green: #2ecc71;
            --hitzone-y: 80px; 
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        #visualizer-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.1; pointer-events: none;
        }

        #highway-canvas {
            flex: 1; background: #000; cursor: crosshair;
            z-index: 5;
        }

        #chord-display {
            height: 60px; background: linear-gradient(180deg, #222, #000);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; color: var(--glow);
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
            border-bottom: 2px solid #333; letter-spacing: 2px;
            position: relative; flex-shrink: 0; z-index: 10;
        }

        .user-logo {
            position: absolute; right: 60px; top: 50%;
            transform: translateY(-50%); height: 45px; width: auto;
        }

        #metronome-dot {
            position: absolute; right: 20px; width: 12px; height: 12px;
            border-radius: 50%; background: #333;
        }
        .dot-active { background: var(--red) !important; box-shadow: 0 0 10px var(--red); }

        .toolbar {
            padding: 8px 15px; background: #111; display: flex; gap: 8px; 
            align-items: center; border-bottom: 1px solid #333; flex-shrink: 0;
            z-index: 10;
        }

        .transpose-ctrl {
            display: flex; align-items: center; gap: 5px; 
            background: #222; padding: 2px 8px; border-radius: 4px;
            border: 1px solid #444;
        }
        .transpose-val { font-family: monospace; font-weight: bold; color: var(--glow); min-width: 25px; text-align: center; }
        
        .seek-container { width: 100%; display: flex; align-items: center; gap: 10px; background: #111; padding: 10px 15px; box-sizing: border-box; z-index: 10; }
        #seek-slider { flex: 1; cursor: pointer; accent-color: var(--glow); }

        button { cursor: pointer; padding: 8px 15px; font-weight: bold; background: #222; color: white; border: 1px solid #444; border-radius: 4px; }
        .active-btn { background: var(--glow) !important; color: black; }
        .rec-running { background: var(--red) !important; animation: pulse-rec 1s infinite; }
        
        #bar-info { font-family: monospace; color: var(--glow); font-size: 14px; margin-left: auto; }
        #watermark { position: fixed; bottom: 20px; right: 20px; color: rgba(255,255,255,0.2); font-weight: bold; display: none; z-index: 100; }
        .recording-active #watermark { display: block; }
        .recording-active .toolbar, .recording-active .seek-container { display: none !important; }

        @keyframes pulse-rec { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>

<canvas id="visualizer-canvas"></canvas>

    <span id="audio-status-label" style="font-size: 11px; color:#888">MP3 Belum dimuat</span>

const Engine = {
    timeline: [], 
    tempo: 0.169, 
    currentIndex: 0, 
    isPlaying: false, 
    isLooping: false, 
    isMetroOn: true,
    transposeValue: 0, 
    lookahead: 0.1,      
    scheduleInterval: 25, 
    nextNoteTime: 0.0,   
    timerID: null,
    audioCtx: null, 
    masterGain: null, 
    analyzer: null, 
    audioDest: null, 
    layerState: {}, 
    isRecording: false, 
    sampleBuffer: null,

    // HIGHWAY PARAMS
    scrollSpeed: 250, 
    hitZoneY: 80, 
    laneImages: {},

    initAudio() {
        if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.audioCtx.createGain();
            this.masterGain.gain.value = 0.8;
            this.analyzer = this.audioCtx.createAnalyser();
            this.analyzer.fftSize = 128;
            this.masterGain.connect(this.analyzer);
            this.analyzer.connect(this.audioCtx.destination);
            this.audioDest = this.audioCtx.createMediaStreamDestination();
            this.analyzer.connect(this.audioDest);
            this.startVisualizer();
            this.startHighway();
        }
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    },

    async loadSample(file) {
        this.initAudio();
        const arrayBuffer = await file.arrayBuffer();
        this.sampleBuffer = await this.audioCtx.decodeAudioData(arrayBuffer);
        document.getElementById('audio-status-label').textContent = "SUARA SIAP ✅";
        document.getElementById('audio-status-label').style.color = "#2ecc71";
    },

    scheduleVoice(noteValue, time) {
        if (!this.sampleBuffer || !this.audioCtx) return null;
        const baseMidi = 60 + parseInt(noteValue);
        const midiTarget = baseMidi + this.transposeValue;
        const playbackRate = Math.pow(2, (midiTarget - 67) / 12);
        const source = this.audioCtx.createBufferSource();
        source.buffer = this.sampleBuffer;
        source.playbackRate.setValueAtTime(playbackRate, time);
        source.loop = true; 
        source.loopStart = 0.15; 
        source.loopEnd = 0.85;
        const voiceGain = this.audioCtx.createGain();
        voiceGain.gain.setValueAtTime(0, time);
        voiceGain.gain.linearRampToValueAtTime(0.7, time + 0.02);
        source.connect(voiceGain);
        voiceGain.connect(this.masterGain);
        source.start(time);
        return { source, gain: voiceGain, noteId: noteValue, startTime: time };
    },

    stopVoiceAtTime(voice, time) {
        if (!voice) return;
        voice.gain.gain.cancelScheduledValues(time);
        voice.gain.gain.linearRampToValueAtTime(0, time + 0.1);
        setTimeout(() => { try { voice.source.stop(); } catch(e){} }, (time - this.audioCtx.currentTime) * 1000 + 150);
    },

    scheduler() {
        if (!this.isPlaying) return;
        const totalSteps = this.timeline.length * 16;
        if (this.currentIndex >= totalSteps) {
            if (this.isLooping) { this.currentIndex = 0; this.nextNoteTime = this.audioCtx.currentTime; }
            else { this.stopAll(); return; }
        }
        while (this.nextNoteTime < this.audioCtx.currentTime + this.lookahead) {
            this.scheduleNote(this.currentIndex, this.nextNoteTime);
            this.advanceNote();
        }
        this.timerID = setTimeout(() => this.scheduler(), this.scheduleInterval);
    },

    scheduleNote(index, time) {
        const totalSteps = this.timeline.length * 16;
        if (index >= totalSteps) return;
        const barIdx = Math.floor(index / 16);
        const stepIdx = index % 16;
        const currentGrid = this.timeline[barIdx].grid;

        if (this.isMetroOn && stepIdx % 4 === 0) {
            const osc = this.audioCtx.createOscillator();
            const g = this.audioCtx.createGain();
            osc.frequency.setValueAtTime(1200, time);
            g.gain.setValueAtTime(0.05, time);
            g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            osc.connect(g); g.connect(this.masterGain);
            osc.start(time); osc.stop(time + 0.05);
        }

        currentGrid.forEach((row, rowIdx) => {
            const val = row[stepIdx];
            if (val !== undefined && val !== null && val !== "") {
                if (this.layerState[rowIdx]) this.stopVoiceAtTime(this.layerState[rowIdx], time);
                const v = this.scheduleVoice(val, time);
                if (v) this.layerState[rowIdx] = v;
            }
        });

        setTimeout(() => {
            if (!this.isPlaying) return;
            document.getElementById('bar-info').textContent = `BAR: ${barIdx + 1}/${this.timeline.length} | TICK: ${stepIdx}`;
            document.getElementById('seek-slider').value = index;
            if (stepIdx % 4 === 0) {
                const dot = document.getElementById('metronome-dot');
                dot.classList.add('dot-active');
                setTimeout(() => dot.classList.remove('dot-active'), 100);
            }
        }, (time - this.audioCtx.currentTime) * 1000);
    },

    advanceNote() {
        this.currentIndex++;
        this.nextNoteTime += this.tempo; 
    },

    startVisualizer() {
        const canvas = document.getElementById('visualizer-canvas');
        const ctx = canvas.getContext('2d');
        const draw = () => {
            requestAnimationFrame(draw);
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if (!this.analyzer) return;
            const dataArray = new Uint8Array(this.analyzer.frequencyBinCount);
            this.analyzer.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let x = 0;
            const barWidth = (canvas.width / dataArray.length) * 2;
            for(let i = 0; i < dataArray.length; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height * 0.3;
                ctx.fillStyle = `rgba(251, 191, 36, 0.15)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                x += barWidth;
            }
        };
        draw();
    },

    startHighway() {
        const canvas = document.getElementById('highway-canvas');
        const ctx = canvas.getContext('2d');
        
        for(let i=0; i<=30; i++) {
            const img = new Image();
            img.src = IMAGE_MAP[i] || IMAGE_MAP["0"];
            this.laneImages[i] = img;
        }

        const render = () => {
            requestAnimationFrame(render);
            canvas.width = window.innerWidth;
            canvas.height = canvas.offsetHeight;
            
            const laneWidth = canvas.width / 31;
            const now = this.audioCtx ? this.audioCtx.currentTime : 0;
            const shakingLanes = new Set();

            // 1. Background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<=30; i++) {
                ctx.strokeStyle = '#151515';
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0); ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }

            // 2. Falling Sustain Notes (Bottom to Top)
            if (this.isPlaying && this.timeline.length > 0) {
                const totalSteps = this.timeline.length * 16;
                
                for(let i = 0; i < totalSteps; i++) {
                    const stepTime = this.nextNoteTime + (i - this.currentIndex) * this.tempo;
                    const barIdx = Math.floor(i / 16);
                    const stepIdx = i % 16;
                    const grid = this.timeline[barIdx].grid;

                    grid.forEach(row => {
                        const val = row[stepIdx];
                        if (val !== undefined && val !== null && val !== "") {
                            // Hitung Durasi (Sustain)
                            let durationTicks = 1;
                            let nextI = i + 1;
                            while(nextI < totalSteps) {
                                const nextBar = Math.floor(nextI / 16);
                                const nextStep = nextI % 16;
                                const nextVal = this.timeline[nextBar].grid[grid.indexOf(row)][nextStep];
                                if (nextVal === undefined || nextVal === null || nextVal === "") {
                                    durationTicks++;
                                    nextI++;
                                } else { break; }
                            }

                            const noteDuration = durationTicks * this.tempo;
                            const actualNote = parseInt(val) + this.transposeValue;
                            
                            // Y adalah titik ATAS (Note On)
                            const yTop = this.hitZoneY + (stepTime - now) * this.scrollSpeed;
                            const sustainHeight = noteDuration * this.scrollSpeed;
                            const yBottom = yTop + sustainHeight;

                            // Render jika berada di dalam layar
                            if (yBottom > 0 && yTop < canvas.height) {
                                if (actualNote >=0 && actualNote <= 30) {
                                    // Deteksi collision dengan hitzone untuk efek getar
                                    if (yTop <= this.hitZoneY && yBottom >= this.hitZoneY) {
                                        shakingLanes.add(actualNote);
                                    }

                                    // Warna Berdasarkan Range
                                    let color;
                                    if (actualNote < 10) color = ['#ff4757', '#b33939'];
                                    else if (actualNote < 20) color = ['#fbbf24', '#cc8e00'];
                                    else color = ['#3b82f6', '#1e3799'];

                                    const grad = ctx.createLinearGradient(0, yTop, 0, yBottom);
                                    grad.addColorStop(0, color[0]);
                                    grad.addColorStop(1, color[1]);

                                    ctx.fillStyle = grad;
                                    ctx.shadowBlur = (yTop <= this.hitZoneY && yBottom >= this.hitZoneY) ? 15 : 0;
                                    ctx.shadowColor = color[0];
                                    
                                    // Menggambar Balok Bulat (Rounded Rect)
                                    const x = actualNote * laneWidth + 4;
                                    const w = laneWidth - 8;
                                    ctx.beginPath();
                                    ctx.roundRect(x, yTop, w, sustainHeight, 5);
                                    ctx.fill();
                                    ctx.shadowBlur = 0;
                                }
                            }
                        }
                    });
                }
            }

            // 3. Hit Zone Line
            ctx.strokeStyle = 'rgba(251, 191, 36, 0.8)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, this.hitZoneY); ctx.lineTo(canvas.width, this.hitZoneY);
            ctx.stroke();

            // 4. Lane Images (Angklung)
            for(let i=0; i<=30; i++) {
                ctx.save();
                let dx = i * laneWidth + laneWidth/2 - 20;
                let dy = this.hitZoneY - 55;
                
                if (shakingLanes.has(i)) {
                    dx += (Math.random() - 0.5) * 6;
                    dy += (Math.random() - 0.5) * 6;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#fbbf24';
                } else {
                    ctx.globalAlpha = 0.3;
                }

                if (this.laneImages[i].complete) {
                    ctx.drawImage(this.laneImages[i], dx, dy, 40, 50);
                }
                ctx.restore();
            }
        };
        render();
    },

    play() {
        if (!this.sampleBuffer) return alert("Muat MP3 dulu!");
        if (this.timeline.length === 0) return alert("Muat JSON dulu!");
        this.initAudio();
        if (this.isPlaying) return;
        this.isPlaying = true;
        document.getElementById('playBtn').classList.add('active-btn');
        this.nextNoteTime = this.audioCtx.currentTime + 0.1;
        this.scheduler();
    },

    stopAll() {
        clearTimeout(this.timerID);
        this.isPlaying = false;
        this.currentIndex = 0;
        document.getElementById('playBtn').classList.remove('active-btn');
        document.getElementById('bar-info').textContent = `BAR: 0/${this.timeline.length} | TICK: 0`;
        document.getElementById('seek-slider').value = 0;
        Object.keys(this.layerState).forEach(k => {
            const v = this.layerState[k];
            if(v) {
                try {
                    v.gain.gain.cancelScheduledValues(this.audioCtx.currentTime);
                    v.gain.gain.setTargetAtTime(0, this.audioCtx.currentTime, 0.05);
                    v.source.stop(this.audioCtx.currentTime + 0.1);
                } catch(e){}
            }
            delete this.layerState[k];
        });
    },

    async toggleRecord() {
        if (this.isRecording) { this.mediaRecorder.stop(); return; }
        try {
            this.initAudio();
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: {frameRate: 60}, audio: true });
            const combined = new MediaStream([stream.getVideoTracks()[0], this.audioDest.stream.getAudioTracks()[0]]);
            this.mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 });
            this.recordedChunks = [];
            this.mediaRecorder.ondataavailable = e => this.recordedChunks.push(e.data);
            this.mediaRecorder.onstop = () => {
                const blob = new Blob(this.recordedChunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `REC_TABKLUNG_${Date.now()}.webm`; a.click();
                this.isRecording = false;
                document.getElementById('main-body').classList.remove('recording-active');
                document.getElementById('recBtn').classList.remove('rec-running');
                stream.getTracks().forEach(t => t.stop());
            };
            this.mediaRecorder.start();
            this.isRecording = true;
            document.getElementById('main-body').classList.add('recording-active');
            document.getElementById('recBtn').classList.add('rec-running');
        } catch (e) {}
    }
};

window.onload = () => {
    const canvas = document.getElementById('highway-canvas');
    canvas.width = window.innerWidth;
    canvas.height = canvas.offsetHeight;
};

window.addEventListener('keydown', (e) => { 
    if (e.key === "Escape" && Engine.isRecording) Engine.toggleRecord(); 
    if (e.code === "Space") {
        e.preventDefault();
        Engine.isPlaying ? Engine.stopAll() : Engine.play();
    }
});

document.getElementById('loadAudioBtn').onclick = () => document.getElementById('audioLoader').click();
document.getElementById('audioLoader').onchange = (e) => Engine.loadSample(e.target.files[0]);
document.getElementById('fileInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const data = JSON.parse(ev.target.result);
        let allBars = [];
        data.sections.forEach(s => allBars = allBars.concat(s.bars));
        Engine.timeline = allBars;
        Engine.tempo = parseFloat(data.tempo) || 0.169;
        document.getElementById('seek-slider').max = (allBars.length * 16) - 1;
        document.getElementById('song-title-text').textContent = data.songTitle || "READY";
        document.getElementById('bar-info').textContent = `BAR: 0/${allBars.length} | TICK: 0`;
    };
    reader.readAsText(e.target.files[0]);
};

document.getElementById('transUp').onclick = () => {
    Engine.transposeValue++;
    document.getElementById('transVal').textContent = (Engine.transposeValue > 0 ? "+" : "") + Engine.transposeValue;
};
document.getElementById('transDown').onclick = () => {
    Engine.transposeValue--;
    document.getElementById('transVal').textContent = (Engine.transposeValue > 0 ? "+" : "") + Engine.transposeValue;
};

document.getElementById('playBtn').onclick = () => Engine.play();
document.getElementById('stopBtn').onclick = () => Engine.stopAll();
document.getElementById('recBtn').onclick = () => Engine.toggleRecord();
document.getElementById('loopBtn').onclick = function() { Engine.isLooping = this.classList.toggle('active-btn'); };
document.getElementById('metroBtn').onclick = function() { Engine.isMetroOn = this.classList.toggle('active-btn'); };
document.getElementById('seek-slider').oninput = function() { 
    Engine.currentIndex = parseInt(this.value);
    if(Engine.isPlaying) Engine.nextNoteTime = Engine.audioCtx.currentTime;
};
</script>
